<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工业视觉质检系统 | Industrial Visual Inspection</title>
  <meta name="description" content="基于 PatchCore 深度学习算法的工业表面缺陷检测系统" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── 顶部导航栏 ── -->
  <header class="navbar">
    <div class="nav-brand">
      <div class="nav-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="11" height="11" rx="2" fill="#3b82f6"/>
          <rect x="15" y="2" width="11" height="11" rx="2" fill="#8b5cf6"/>
          <rect x="2" y="15" width="11" height="11" rx="2" fill="#8b5cf6"/>
          <rect x="15" y="15" width="11" height="11" rx="2" fill="#3b82f6" opacity="0.5"/>
        </svg>
      </div>
      <div>
        <span class="nav-title">InspectAI</span>
        <span class="nav-subtitle">工业视觉质检系统</span>
      </div>
    </div>
    <div class="nav-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusLabel" class="status-text">检查服务状态...</span>
    </div>
  </header>

  <!-- ── 主体内容 ── -->
  <main class="main-content">

    <!-- 标题区 -->
    <section class="hero">
      <h1 class="hero-title">
        <span class="gradient-text">AI 表面缺陷检测</span>
      </h1>
      <p class="hero-desc">基于 PatchCore 算法 · ResNet-50 特征提取 · 实时异常定位</p>
    </section>

    <!-- 核心检测区域 -->
    <div class="inspection-grid">

      <!-- 左: 上传区 -->
      <div class="card upload-card">
        <div class="card-header">
          <span class="card-icon">📤</span>
          <h2 class="card-title">上传检测图片</h2>
        </div>

        <div class="drop-zone" id="dropZone">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
              <path d="M24 32V18M24 18L18 24M24 18L30 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            </svg>
          </div>
          <p class="drop-main">拖拽图片到此处</p>
          <p class="drop-sub">或点击选择文件</p>
          <p class="drop-hint">支持 PNG · JPG · BMP · TIFF</p>
          <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.bmp,.tiff" hidden />
        </div>

        <div class="preview-area" id="previewArea" style="display:none;">
          <img id="previewImg" class="preview-img" alt="预览图片" />
          <div class="preview-info">
            <span id="previewName" class="preview-name"></span>
            <button class="btn-clear" id="clearBtn">✕ 清除</button>
          </div>
        </div>

        <button class="btn-inspect" id="inspectBtn" disabled>
          <span class="btn-text">开始检测</span>
          <span class="btn-spinner" id="btnSpinner" style="display:none">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="spin">
              <circle cx="9" cy="9" r="7" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
              <path d="M9 2a7 7 0 0 1 7 7" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
            检测中...
          </span>
        </button>
      </div>

      <!-- 右: 结果区 -->
      <div class="card result-card" id="resultCard">
        <div class="card-header">
          <span class="card-icon">📊</span>
          <h2 class="card-title">检测结果</h2>
        </div>

        <!-- 初始占位 -->
        <div class="result-placeholder" id="resultPlaceholder">
          <div class="placeholder-icon">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" opacity="0.3">
              <rect x="8" y="8" width="48" height="48" rx="8" stroke="currentColor" stroke-width="2"/>
              <circle cx="32" cy="28" r="8" stroke="currentColor" stroke-width="2"/>
              <path d="M16 52c0-8.837 7.163-16 16-16s16 7.163 16 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="placeholder-text">上传图片后，AI 将在此显示检测结果</p>
        </div>

        <!-- 实际结果 -->
        <div class="result-content" id="resultContent" style="display:none;">
          <!-- PASS/FAIL 大字判定 -->
          <div class="verdict-banner" id="verdictBanner">
            <div class="verdict-icon" id="verdictIcon"></div>
            <div class="verdict-label" id="verdictLabel"></div>
            <div class="verdict-sub" id="verdictSub"></div>
          </div>

          <!-- 置信度 -->
          <div class="metrics-row">
            <div class="metric-box">
              <div class="metric-label">置信度</div>
              <div class="metric-value" id="confValue">—</div>
              <div class="metric-bar-bg">
                <div class="metric-bar-fill" id="confBar"></div>
              </div>
            </div>
            <div class="metric-box">
              <div class="metric-label">异常分数</div>
              <div class="metric-value mono" id="scoreValue">—</div>
              <div class="metric-label" style="font-size:11px;margin-top:4px;">阈值: <span id="threshValue" class="mono">—</span></div>
            </div>
          </div>

          <!-- 图片对比: 原图 + 热力图 -->
          <div class="image-compare">
            <div class="compare-item">
              <div class="compare-label">原始图片</div>
              <img id="origImg" class="compare-img" alt="原始图片" />
            </div>
            <div class="compare-item">
              <div class="compare-label">缺陷热力图</div>
              <img id="heatmapImg" class="compare-img heatmap-img" alt="热力图" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部统计栏 -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">本次检测总数</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value pass" id="statPass">0</div>
        <div class="stat-label">合格 (PASS)</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value fail" id="statFail">0</div>
        <div class="stat-label">不合格 (FAIL)</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statYield">—</div>
        <div class="stat-label">良率 (Yield Rate)</div>
      </div>
    </div>

  </main>

  <!-- 错误提示 Toast -->
  <div class="toast" id="toast" style="display:none;"></div>

  <script src="/static/app.js"></script>
</body>
</html>
